<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Firebase Connection</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .success { color: green; }
        .error { color: red; }
        .info { background: #f0f0f0; padding: 10px; margin: 10px 0; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>🔍 Test de Conexión Firebase - Cliente Web</h1>
    
    <div id="status"></div>
    <div id="results"></div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js';
        import { getDatabase, ref, get } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-database.js';

        const firebaseConfig = {
            apiKey: "AIzaSyBDhfRPeIDoKy9piHjQJOc3dTd2Mz64VK8",
            authDomain: "myappdelivery-4a576.firebaseapp.com",
            databaseURL: "https://myappdelivery-4a576-default-rtdb.firebaseio.com",
            projectId: "myappdelivery-4a576",
            storageBucket: "myappdelivery-4a576.firebasestorage.app",
            messagingSenderId: "184603550662",
            appId: "1:184603550662:web:2b0a1814f8606936d0c8c7",
            measurementId: "G-JEKFJ7LPBG"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        const statusDiv = document.getElementById('status');
        const resultsDiv = document.getElementById('results');

        async function testConnection() {
            try {
                statusDiv.innerHTML = '<p class="info">🔄 Conectando a Firebase...</p>';
                
                // Test 1: Verificar conexión
                const clientsRef = ref(database, 'clients');
                const snapshot = await get(clientsRef);
                
                if (snapshot.exists()) {
                    const clients = snapshot.val();
                    statusDiv.innerHTML = '<p class="success">✅ ¡Conexión exitosa a Firebase!</p>';
                    
                    // Test 2: Buscar cliente por defecto
                    const defaultClient = Object.values(clients).find(client => 
                        client.email === 'cliente@demo.com' && client.password === '123456'
                    );
                    
                    if (defaultClient) {
                        resultsDiv.innerHTML = `
                            <div class="info">
                                <h3>✅ Cuenta de prueba encontrada:</h3>
                                <p><strong>Email:</strong> ${defaultClient.email}</p>
                                <p><strong>Contraseña:</strong> ${defaultClient.password}</p>
                                <p><strong>Nombre:</strong> ${defaultClient.name}</p>
                                <p><strong>ID:</strong> ${defaultClient.id}</p>
                            </div>
                            <p class="success"><strong>¡El login debería funcionar!</strong></p>
                        `;
                    } else {
                        resultsDiv.innerHTML = `
                            <div class="info">
                                <h3>⚠️ Cuenta de prueba NO encontrada</h3>
                                <p>Clientes encontrados: ${Object.keys(clients).length}</p>
                                <pre>${JSON.stringify(clients, null, 2)}</pre>
                            </div>
                            <p class="error"><strong>El login NO funcionará porque no encuentra la cuenta demo</strong></p>
                        `;
                    }
                } else {
                    statusDiv.innerHTML = '<p class="error">❌ No hay datos en la base de datos</p>';
                }
            } catch (error) {
                statusDiv.innerHTML = `<p class="error">❌ Error de conexión: ${error.message}</p>`;
                resultsDiv.innerHTML = `
                    <div class="info">
                        <p><strong>Posibles causas:</strong></p>
                        <ul>
                            <li>Reglas de seguridad muy restrictivas</li>
                            <li>Credenciales incorrectas</li>
                            <li>Problema de red</li>
                        </ul>
                    </div>
                `;
            }
        }

        testConnection();
    </script>
</body>
</html>
